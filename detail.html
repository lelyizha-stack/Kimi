<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Game - Karbit Prime</title>
  <meta name="description" content="Halaman detail game Karbit Prime dengan tampilan baru yang lebih minimalis, modern, dan fokus ke informasi penting.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="./style.css">
  <style>
    .detail-page {
      padding: 34px 0 56px;
    }

    .breadcrumb {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .breadcrumb a:hover {
      color: var(--text);
    }

    .detail-hero,
    .detail-panel,
    .related-shell,
    .detail-side {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      box-shadow: var(--shadow);
    }

    .detail-hero {
      display: grid;
      grid-template-columns: minmax(280px, 0.95fr) minmax(0, 1.05fr);
      gap: 22px;
      border-radius: 28px;
      overflow: hidden;
    }

    .detail-cover {
      position: relative;
      min-height: 420px;
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: flex-end;
      padding: 22px;
    }

    .detail-cover img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .detail-cover::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(4, 8, 18, 0.12), rgba(4, 8, 18, 0.64));
    }

    .detail-cover > * {
      position: relative;
      z-index: 1;
    }

    .detail-emoji {
      width: 74px;
      height: 74px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 22px;
      font-size: 2rem;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(10px);
    }

    .detail-info {
      padding: 26px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .detail-info h1 {
      margin: 16px 0 12px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .detail-info p {
      margin: 0;
      color: var(--muted);
      line-height: 1.78;
    }

    .detail-tag-row,
    .detail-genre-row,
    .detail-actions,
    .detail-top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .detail-tag-row {
      margin-top: 16px;
    }

    .detail-genre-row {
      margin-top: 16px;
    }

    .detail-actions {
      margin-top: 22px;
    }

    .detail-top-actions {
      margin-top: 18px;
    }

    .detail-pill,
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 0.92rem;
    }

    .detail-pill.is-category {
      background: rgba(124, 140, 255, 0.14);
      border-color: rgba(124, 140, 255, 0.28);
      color: #dbe1ff;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(300px, 0.85fr);
      gap: 20px;
      margin-top: 22px;
    }

    .detail-panel,
    .detail-side,
    .related-shell {
      border-radius: 24px;
      padding: 24px;
    }

    .detail-panel h2,
    .detail-side h2,
    .related-shell h2 {
      margin: 0 0 10px;
      font-size: 1.5rem;
    }

    .detail-panel p,
    .detail-side p,
    .related-shell p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .summary-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
    }

    .summary-card strong {
      display: block;
      font-size: 1.15rem;
      margin-bottom: 6px;
      color: var(--text);
    }

    .summary-card span {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .detail-list {
      list-style: none;
      padding: 0;
      margin: 18px 0 0;
      display: grid;
      gap: 10px;
    }

    .detail-list li {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      color: var(--muted);
      line-height: 1.65;
    }

    .detail-list b {
      color: var(--text);
    }

    .related-shell {
      margin-top: 22px;
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .related-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      transition: 0.2s ease;
    }

    .related-card:hover {
      transform: translateY(-4px);
      border-color: rgba(124, 140, 255, 0.32);
    }

    .related-cover {
      position: relative;
      height: 190px;
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: flex-end;
      padding: 16px;
    }

    .related-cover img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .related-cover::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(4, 8, 18, 0.08), rgba(4, 8, 18, 0.48));
    }

    .related-cover > * {
      position: relative;
      z-index: 1;
    }

    .related-badge {
      width: 54px;
      height: 54px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.22);
      font-size: 1.5rem;
    }

    .related-body {
      padding: 18px;
    }

    .related-body h3 {
      margin: 0 0 8px;
      font-size: 1.15rem;
      line-height: 1.3;
    }

    .related-body p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .related-actions {
      display: flex;
      margin-top: 14px;
    }

    .empty-state,
    .not-found,
    .loading-wrap {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      box-shadow: var(--shadow);
      border-radius: 24px;
      text-align: center;
      padding: 30px;
    }

    .loading-wrap,
    .empty-state p,
    .not-found p {
      color: var(--muted);
    }

    .not-found h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    @media (max-width: 980px) {
      .detail-hero,
      .detail-grid,
      .related-grid {
        grid-template-columns: 1fr;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .detail-cover {
        min-height: 320px;
      }
    }

    @media (max-width: 760px) {
      .detail-page {
        padding-top: 24px;
      }

      .detail-panel,
      .detail-side,
      .related-shell,
      .detail-info {
        padding: 20px;
      }

      .detail-actions .btn,
      .detail-top-actions .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="container header-inner">
        <a href="./index.html" class="brand" aria-label="Karbit Prime home">
          <span class="brand-mark">KP</span>
          <span class="brand-copy">
            <strong>Karbit Prime</strong>
            <small>TL Indo • Mod • Cheat</small>
          </span>
        </a>

        <button class="nav-toggle" id="navToggle" type="button" aria-expanded="false" aria-controls="siteNav" aria-label="Buka menu navigasi">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav" id="siteNav">
          <a href="./index.html">Home</a>
          <a href="./renpy.html">Ren'Py</a>
          <a href="./rpgm.html">RPGM</a>
          <a href="./mod.html">Mod</a>
          <a href="./cheat.html">Cheat</a>
          <a href="./vip.html">VIP</a>
          <a href="./save-editor.html">Save Editor</a>
          <a href="./donasi.html">Donasi</a>
          <a href="./profile.html">Profil</a>
        </nav>
      </div>
    </header>

    <main class="detail-page">
      <div class="container">
        <div id="detailApp" class="loading-wrap">Memuat detail game...</div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>
          <strong>Karbit Prime</strong>
          <p>Modern catalog untuk Ren'Py, RPGM, Mod, Cheat, VIP, dan tool pilihan.</p>
        </div>
        <div class="footer-links">
          <a href="./vip.html">VIP</a>
          <a href="./save-editor.html">Save Editor</a>
          <a href="./donasi.html">Donasi</a>
          <a href="./profile.html">Profil</a>
        </div>
      </div>
    </footer>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AWDtjMVCqdm-kXhbZ2NlEllCYe7CnbriUv7NbxKBur1iMSfaMiF3tm2-A5jJf2RuXR734zwqG0w-scWiMkbyTZ-nT_VGpr_ft6dOgeVkdmRsUKdKP8FvDtLujTU4B29zCYL0qNtbdkogGbkZf22cyTv4AwkGu5eHJ0zoFioctKSx3YH4aTam4f1w-8CIMLSXiRf0yr3D71MaQcyaopQfGcezNiGKcFz1nR01ngxRk-mUXaMqAJ_pSoLuCtHvRUuPdAWNnHnqbXD-hWgg9CgKDUNKz3GNMHuN5A&lib=M51hLTJXPQ14ZsjBvmZx8t4ZA7c56I8fg&sheet=githubweb_game_update";

    function escapeHTML(text) {
      return String(text ?? "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[m]));
    }

    function normalizeCsvArray(value) {
      if (Array.isArray(value)) {
        return value.map((s) => String(s).trim()).filter(Boolean);
      }
      return String(value || "")
        .split(",")
        .map((s) => s.trim())
        .filter(Boolean);
    }

    function normalizeString(value) {
      return String(value || "").trim();
    }

    function normalizeDownloadUrls(game) {
      const urls = game.downloadUrls && typeof game.downloadUrls === "object" ? game.downloadUrls : {};
      const legacy = String(game.downloadUrl || "").trim();
      const platforms = Array.isArray(game.platform) ? game.platform : [];

      return {
        Windows: urls.Windows || ((legacy && platforms.includes("Windows")) ? legacy : ""),
        Android: urls.Android || ((legacy && platforms.includes("Android")) ? legacy : "")
      };
    }

    function categoryPage(category) {
      const map = {
        renpy: "./renpy.html",
        rpgm: "./rpgm.html",
        mod: "./mod.html",
        cheat: "./cheat.html",
        vip: "./vip.html"
      };
      return map[category] || "./index.html";
    }

    function categoryLabel(category) {
      const map = {
        renpy: "Ren'Py",
        rpgm: "RPGM",
        mod: "Mod",
        cheat: "Cheat",
        vip: "VIP"
      };
      return map[category] || "Katalog";
    }

    function renderImage(game) {
      if (game.image && String(game.image).trim()) {
        return `<img src="${escapeHTML(game.image)}" alt="${escapeHTML(game.title)}">`;
      }
      return "";
    }

    function shortText(text, max = 118) {
      const value = String(text || "").trim();
      if (value.length <= max) return value;
      return value.slice(0, max).trim() + "...";
    }

    function renderDownloadButtons(game) {
      const urls = normalizeDownloadUrls(game);
      const platforms = Array.isArray(game.platform) ? game.platform : [];
      const buttons = [];

      if (platforms.includes("Windows") && urls.Windows) {
        buttons.push(`<a href="${escapeHTML(urls.Windows)}" class="btn btn-primary" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-windows"></i> Download Windows</a>`);
      }
      if (platforms.includes("Android") && urls.Android) {
        buttons.push(`<a href="${escapeHTML(urls.Android)}" class="btn btn-primary" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-android"></i> Download Android</a>`);
      }
      if (!buttons.length) {
        buttons.push(`<a href="#" class="btn btn-secondary" aria-disabled="true">Download belum tersedia</a>`);
      }
      return buttons.join("");
    }

    function renderGenreChips(game) {
      return (game.genres || []).map((genre) => `<span class="meta-chip">${escapeHTML(genre)}</span>`).join("");
    }

    function renderTagRow(game) {
      const tags = [];
      tags.push(`<a class="detail-pill is-category" href="${escapeHTML(categoryPage(game.category))}">${escapeHTML(categoryLabel(game.category))}</a>`);
      if (game.status) tags.push(`<span class="detail-pill">${escapeHTML(game.status)}</span>`);
      if (game.access && String(game.access).toLowerCase() === "vip") tags.push(`<span class="detail-pill">VIP</span>`);
      return tags.join("");
    }

    function renderRelatedCard(game) {
      const detailUrl = `./detail.html?slug=${encodeURIComponent(game.slug || "")}`;
      return `
        <article class="related-card">
          <div class="related-cover">
            ${renderImage(game)}
            <div class="related-badge">${escapeHTML(game.emoji || "🎮")}</div>
          </div>
          <div class="related-body">
            <div class="detail-top-actions">
              <span class="detail-pill is-category">${escapeHTML(categoryLabel(game.category))}</span>
            </div>
            <h3>${escapeHTML(game.title || "")}</h3>
            <p>${escapeHTML(shortText(game.description || ""))}</p>
            <div class="related-actions">
              <a href="${escapeHTML(detailUrl)}" class="btn btn-secondary">Detail</a>
            </div>
          </div>
        </article>
      `;
    }

    function renderNotFound(app, slug) {
      app.innerHTML = `
        <section class="not-found">
          <h1>Game tidak ditemukan</h1>
          <p>Slug <b>${escapeHTML(slug || "-")}</b> tidak ditemukan di katalog saat ini.</p>
          <div class="detail-top-actions" style="justify-content:center; margin-top:18px;">
            <a href="./index.html" class="btn btn-primary">Kembali ke Home</a>
            <a href="./renpy.html" class="btn btn-secondary">Buka Katalog</a>
          </div>
        </section>
      `;
    }

    function renderDetail(app, game, allGames) {
      const currentSlug = String(game.slug || "").trim().toLowerCase();
      const currentTitle = String(game.title || "").trim().toLowerCase();
      const currentId = String(game.id || "").trim().toLowerCase();
      const categoryHref = categoryPage(game.category);

      const related = allGames
        .filter((item) => {
          const itemSlug = String(item.slug || "").trim().toLowerCase();
          const itemTitle = String(item.title || "").trim().toLowerCase();
          const itemId = String(item.id || "").trim().toLowerCase();
          if (itemSlug && currentSlug && itemSlug === currentSlug) return false;
          if (itemId && currentId && itemId === currentId) return false;
          if (itemTitle && currentTitle && itemTitle === currentTitle) return false;
          return true;
        })
        .filter((item) => item.category === game.category || (item.genres || []).some((genre) => (game.genres || []).includes(genre)))
        .slice(0, 3);

      document.title = `${game.title} - Karbit Prime`;

      app.innerHTML = `
        <nav class="breadcrumb">
          <a href="./index.html">Home</a>
          <span>•</span>
          <a href="${escapeHTML(categoryHref)}">${escapeHTML(categoryLabel(game.category))}</a>
          <span>•</span>
          <span>${escapeHTML(game.title || "Detail")}</span>
        </nav>

        <section class="detail-hero">
          <div class="detail-cover">
            ${renderImage(game)}
            <div class="detail-emoji">${escapeHTML(game.emoji || "🎮")}</div>
          </div>

          <div class="detail-info">
            <span class="eyebrow small">Detail Game</span>
            <h1>${escapeHTML(game.title || "")}</h1>
            <p>${escapeHTML(shortText(game.description || "Belum ada deskripsi singkat untuk game ini.", 180))}</p>

            <div class="detail-tag-row">
              ${renderTagRow(game)}
            </div>

            <div class="detail-genre-row">
              ${renderGenreChips(game)}
            </div>

            <div class="summary-grid">
              <div class="summary-card">
                <strong>${escapeHTML(game.version || "-")}</strong>
                <span>Versi</span>
              </div>
              <div class="summary-card">
                <strong>${escapeHTML(game.size || "-")}</strong>
                <span>Ukuran</span>
              </div>
              <div class="summary-card">
                <strong>${escapeHTML(game.language || "-")}</strong>
                <span>Bahasa</span>
              </div>
            </div>

            <div class="detail-actions">
              ${renderDownloadButtons(game)}
              <a href="${escapeHTML(categoryHref)}" class="btn btn-secondary">Kembali ke ${escapeHTML(categoryLabel(game.category))}</a>
            </div>
          </div>
        </section>

        <section class="detail-grid">
          <article class="detail-panel">
            <h2>Deskripsi lengkap</h2>
            <p>${escapeHTML(game.description || "Belum ada deskripsi lengkap untuk game ini.")}</p>
          </article>

          <aside class="detail-side">
            <h2>Info tambahan</h2>
            <ul class="detail-list">
              <li><b>Kategori:</b> ${escapeHTML(categoryLabel(game.category))}</li>
              <li><b>Genre:</b> ${escapeHTML((game.genres || []).join(", ") || "-")}</li>
              <li><b>Platform:</b> ${escapeHTML((game.platform || []).join(", ") || "-")}</li>
              <li><b>Status:</b> ${escapeHTML(game.status || "Updated")}</li>
              <li><b>Bahasa:</b> ${escapeHTML(game.language || "-")}</li>
              <li><b>Update:</b> ${escapeHTML(game.createdAt || "-")}</li>
            </ul>
          </aside>
        </section>

        <section class="related-shell">
          <h2>Game terkait</h2>
          <p>Judul lain yang masih satu kategori atau punya genre yang mirip.</p>
          <div class="related-grid">
            ${related.length ? related.map(renderRelatedCard).join("") : `<div class="empty-state"><p>Belum ada game terkait untuk ditampilkan.</p></div>`}
          </div>
        </section>
      `;
    }

    async function initDetail() {
      const app = document.getElementById("detailApp");
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug") || "";

      if (!slug) {
        renderNotFound(app, slug);
        return;
      }

      try {
        const res = await fetch(APPS_SCRIPT_URL);
        if (!res.ok) throw new Error("Gagal memuat data katalog.");
        const data = await res.json();
        const rows = Array.isArray(data) ? data : Array.isArray(data.rows) ? data.rows : [];

        const games = rows.map((row) => ({
          ...row,
          id: normalizeString(row.id),
          slug: normalizeString(row.slug),
          title: normalizeString(row.title || row.judul),
          category: normalizeString(row.category || row.kategori).toLowerCase(),
          access: normalizeString(row.access || row.akses || "public").toLowerCase(),
          genres: normalizeCsvArray(row.genres || row.genre),
          platform: normalizeCsvArray(row.platform),
          version: normalizeString(row.version || row.versi),
          size: normalizeString(row.size || row.ukuran),
          language: normalizeString(row.language || row.bahasa),
          status: normalizeString(row.status),
          emoji: normalizeString(row.emoji),
          image: normalizeString(row.image || row.gambar),
          description: normalizeString(row.description || row.deskripsi),
          detailUrl: normalizeString(row.detailUrl),
          windowsUrl: normalizeString(row.windowsUrl),
          androidUrl: normalizeString(row.androidUrl),
          createdAt: normalizeString(row.createdAt || row.dibuatPada || row.dibuatpada)
        }));

        const game = games.find((item) => String(item.slug || "") === slug);
        if (!game) {
          renderNotFound(app, slug);
          return;
        }
        renderDetail(app, game, games);
      } catch (err) {
        app.innerHTML = `<section class="not-found"><h1>Gagal memuat detail</h1><p>${escapeHTML(err.message)}</p></section>`;
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const nav = document.getElementById("siteNav");
      const toggle = document.getElementById("navToggle");
      if (nav && toggle) {
        const STORAGE_KEY = "kp-mobile-nav-collapsed";
        const isMobile = () => window.matchMedia("(max-width: 900px)").matches;
        const setState = (collapsed) => {
          nav.classList.toggle("is-collapsed", collapsed);
          toggle.classList.toggle("is-active", !collapsed);
          toggle.setAttribute("aria-expanded", collapsed ? "false" : "true");
        };
        const loadState = () => {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved === null) return true;
          return saved === "1";
        };
        const applyResponsiveState = () => {
          if (isMobile()) {
            setState(loadState());
          } else {
            nav.classList.remove("is-collapsed");
            toggle.classList.remove("is-active");
            toggle.setAttribute("aria-expanded", "true");
          }
        };
        toggle.addEventListener("click", () => {
          const collapsed = !nav.classList.contains("is-collapsed");
          setState(collapsed);
          localStorage.setItem(STORAGE_KEY, collapsed ? "1" : "0");
        });
        window.addEventListener("resize", applyResponsiveState);
        applyResponsiveState();
      }
      initDetail();
    });
  </script>
</body>
</html>
