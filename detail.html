<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Game - Karbit Prime</title>
  <meta name="description" content="Halaman detail game dinamis Karbit Prime.">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    .detail-shell{padding:54px 0 60px}
    .breadcrumb{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 18px;color:var(--muted);font-size:14px}
    .breadcrumb a:hover{color:var(--text)}
    .detail-hero{
      display:grid;grid-template-columns:minmax(280px,.95fr) minmax(0,1.05fr);
      gap:22px;align-items:stretch
    }
    .detail-cover-card,.detail-info-card,.related-panel{
      background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow)
    }
    .detail-cover-card{overflow:hidden}
    .detail-cover{
      position:relative;min-height:380px;background:rgba(255,255,255,.03);
      display:flex;align-items:flex-end;justify-content:flex-start;padding:18px
    }
    .detail-cover img{
      position:absolute;inset:0;width:100%;height:100%;object-fit:cover
    }
    .detail-cover::before{
      content:"";position:absolute;inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.55))
    }
    .detail-cover > *{position:relative;z-index:1}
    .detail-cover-badge{
      width:72px;height:72px;border-radius:20px;display:flex;align-items:center;justify-content:center;
      font-size:32px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(8px)
    }
    .detail-info-card{padding:24px}
    .detail-info-card h1{margin:0 0 12px;font-size:40px;line-height:1.08}
    .detail-info-card p{margin:0;color:var(--muted);line-height:1.75}
    .detail-meta-tags,.detail-downloads,.detail-chips{display:flex;flex-wrap:wrap;gap:10px}
    .detail-downloads{margin-top:18px}
    .detail-summary{margin-top:18px}
    .detail-summary .download-meta{margin-top:0}
    .detail-note{margin-top:18px}
    .detail-extra-grid{
      display:grid;grid-template-columns:1.2fr .8fr;gap:20px;margin-top:22px
    }
    .detail-block,.detail-side-block{
      background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:22px
    }
    .detail-block h2,.detail-side-block h2,.related-panel h2{
      margin:0 0 10px;font-size:28px
    }
    .detail-block p,.detail-side-block p,.related-panel p{
      margin:0;color:var(--muted);line-height:1.75
    }
    .detail-list{list-style:none;padding:0;margin:14px 0 0;display:grid;gap:10px}
    .detail-list li{
      padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.03)
    }
    .related-panel{margin-top:22px;padding:22px}
    .related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px}
    .related-card{
      border:1px solid var(--line);border-radius:20px;overflow:hidden;
      background:rgba(255,255,255,.03);transition:.2s ease
    }
    .related-card:hover{transform:translateY(-3px);border-color:rgba(255,79,163,.40)}
    .related-cover{
      position:relative;height:170px;display:flex;align-items:flex-end;justify-content:flex-start;padding:14px;
      background:rgba(255,255,255,.04)
    }
    .related-cover img{
      position:absolute;inset:0;width:100%;height:100%;object-fit:cover
    }
    .related-cover::before{
      content:"";position:absolute;inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.4))
    }
    .related-cover > *{position:relative;z-index:1}
    .related-emoji{
      width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;
      font-size:24px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18)
    }
    .related-body{padding:16px}
    .related-body h3{margin:0 0 8px;font-size:21px}
    .related-body p{margin:0;color:var(--muted);line-height:1.6}
    .not-found{
      text-align:center;padding:38px;border:1px dashed var(--line-strong);border-radius:24px;
      background:rgba(255,255,255,.03)
    }
    .not-found h1{margin:0 0 10px;font-size:34px}
    .loading-wrap{
      text-align:center;padding:40px;color:var(--muted)
    }
    @media (max-width:980px){
      .detail-hero,.detail-extra-grid,.related-grid{grid-template-columns:1fr}
      .detail-info-card h1{font-size:34px}
    }
    @media (max-width:640px){
      .detail-shell{padding-top:34px}
      .detail-info-card h1{font-size:30px}
      .detail-block h2,.detail-side-block h2,.related-panel h2{font-size:24px}
      .detail-cover{min-height:300px}
      .detail-downloads .btn{width:100%}
    }
  </style>
</head>
<body>

      <button class="nav-toggle" id="navToggle" type="button" aria-expanded="false" aria-controls="mainNav" aria-label="Toggle navigation">

  <span></span>
</button>

<nav class="main-nav" id="mainNav">

  <main class="detail-shell">

  <footer class="site-footer">

      <div class="footer-social-grid">
        <a class="social-box facebook" href="https://www.facebook.com/share/1Aq9ENw3yA/" target="_blank" rel="noopener noreferrer">
          <span class="social-icon"><i class="fab fa-facebook-f"></i></span><span>Facebook</span>

  <script>
    function escapeHTML(text) {
      return String(text ?? "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[m]));
    }

    function normalizeDownloadUrls(game) {
      const urls = game.downloadUrls && typeof game.downloadUrls === "object"
        ? game.downloadUrls
        : {};

      const legacy = String(game.downloadUrl || "").trim();
      const platforms = Array.isArray(game.platform) ? game.platform : [];

      return {
        Windows: urls.Windows || ((legacy && platforms.includes("Windows")) ? legacy : ""),
        Android: urls.Android || ((legacy && platforms.includes("Android")) ? legacy : "")
      };
    }

    function categoryPage(category) {
      const map = {
        renpy: "./renpy.html",
        rpgm: "./rpgm.html",
        mod: "./mod.html",
        cheat: "./cheat.html"
      };
      return map[category] || "./";
    }

    function categoryLabel(category) {
      const map = {
        renpy: "Ren'Py",
        rpgm: "RPGM",
        mod: "Mod",
        cheat: "Cheat"
      };
      return map[category] || "Katalog";
    }

    function renderImage(game) {
      if (game.image && String(game.image).trim()) {
        return `<img src="${escapeHTML(game.image)}" alt="${escapeHTML(game.title)}">`;
      }
      return "";
    }

    function renderDownloadButtons(game) {
      const urls = normalizeDownloadUrls(game);
      const platforms = Array.isArray(game.platform) ? game.platform : [];
      const buttons = [];

      if (platforms.includes("Windows") && urls.Windows) {
        buttons.push(`<a href="${escapeHTML(urls.Windows)}" class="btn btn-primary" target="_blank" rel="noopener noreferrer">Download Windows</a>`);
      }

      if (platforms.includes("Android") && urls.Android) {
        buttons.push(`<a href="${escapeHTML(urls.Android)}" class="btn btn-primary" target="_blank" rel="noopener noreferrer">Download Android</a>`);
      }

      if (!buttons.length) {
        buttons.push(`<a href="#" class="btn btn-primary" aria-disabled="true">Download Belum Tersedia</a>`);
      }

      buttons.push(`<a href="${escapeHTML(categoryPage(game.category))}" class="btn btn-secondary">Kembali ke ${escapeHTML(categoryLabel(game.category))}</a>`);
      return buttons.join("");
    }

    function renderTags(game) {
      const category = `<a class="tag ${escapeHTML(game.category || "")}" href="${escapeHTML(categoryPage(game.category))}">${escapeHTML(String(categoryLabel(game.category)).toUpperCase())}</a>`;
      const platforms = (game.platform || []).map((item) => `<span class="tag platform">${escapeHTML(item)}</span>`).join("");
      const status = `<span class="tag status">${escapeHTML(game.status || "Updated")}</span>`;
      return category + platforms + status;
    }

    function renderGenreChips(game) {
      return (game.genres || []).map((genre) => `<span class="chip">${escapeHTML(genre)}</span>`).join("");
    }

    function shortText(text, max = 120) {
      const value = String(text || "").trim();
      if (value.length <= max) return value;
      return value.slice(0, max).trim() + "...";
    }

    function renderRelatedCard(game) {
      const detailUrl = `./detail.html?slug=${encodeURIComponent(game.slug || "")}`;
      return `
        <article class="related-card">
          <div class="related-cover">
            ${renderImage(game)}
            <div class="related-emoji">${escapeHTML(game.emoji || "🎮")}</div>
          </div>
          <div class="related-body">
            <div class="post-meta">
              <span class="tag ${escapeHTML(game.category || "")}">${escapeHTML(String(categoryLabel(game.category)).toUpperCase())}</span>
            </div>
            <h3>${escapeHTML(game.title || "")}</h3>
            <p>${escapeHTML(shortText(game.description || "", 105))}</p>
            <div class="download-actions">
              <a href="${escapeHTML(detailUrl)}" class="btn btn-secondary">Detail</a>
            </div>
          </div>
        </article>
      `;
    }

    function renderNotFound(app, slug) {
      app.innerHTML = `
        <div class="not-found">
          <h1>Game tidak ditemukan</h1>
          <p class="muted">Slug <b>${escapeHTML(slug || "-")}</b> tidak ditemukan di data katalog.</p>
          <div class="download-actions" style="justify-content:center;margin-top:18px">
            <a href="./" class="btn btn-primary">Kembali ke Home</a>
            <a href="./renpy.html" class="btn btn-secondary">Buka Katalog</a>
          </div>
        </div>
      `;
    }

    function renderDetail(app, game, allGames) {
      const categoryHref = categoryPage(game.category);
      const currentSlug = String(game.slug || "").trim().toLowerCase();
const currentTitle = String(game.title || "").trim().toLowerCase();
const currentId = String(game.id || "").trim().toLowerCase();

const related = allGames
  .filter((item) => {
    const itemSlug = String(item.slug || "").trim().toLowerCase();
    const itemTitle = String(item.title || "").trim().toLowerCase();
    const itemId = String(item.id || "").trim().toLowerCase();

    if (itemSlug && currentSlug && itemSlug === currentSlug) return false;
    if (itemId && currentId && itemId === currentId) return false;
    if (itemTitle && currentTitle && itemTitle === currentTitle) return false;

    return true;
  })
  .filter((item) =>
    item.category === game.category ||
    (item.genres || []).some((genre) => (game.genres || []).includes(genre))
  )
  .slice(0, 3);

      document.title = `${game.title} - Karbit Prime`;

      app.innerHTML = `
        <nav class="breadcrumb">
          <a href="./">Home</a>
          <span>•</span>
          <a href="${escapeHTML(categoryHref)}">${escapeHTML(categoryLabel(game.category))}</a>
          <span>•</span>
          <span>${escapeHTML(game.title)}</span>
        </nav>

        <section class="detail-hero">
          <div class="detail-cover-card">
            <div class="detail-cover">
              ${renderImage(game)}
              <div class="detail-cover-badge">${escapeHTML(game.emoji || "🎮")}</div>
            </div>
          </div>

          <div class="detail-info-card">
            <div class="hero-badge">${escapeHTML(game.emoji || "🎮")} Detail Game</div>
            <h1>${escapeHTML(game.title || "")}</h1>

            <div class="detail-meta-tags" style="margin-top:18px">
              ${renderTags(game)}
            </div>

            <div class="detail-chips" style="margin-top:18px">
              ${renderGenreChips(game)}
            </div>

            <div class="detail-summary">
              <div class="download-meta">
                <div><strong>${escapeHTML(game.version || "-")}</strong><span>Versi</span></div>
                <div><strong>${escapeHTML(game.size || "-")}</strong><span>Ukuran</span></div>
                <div><strong>${escapeHTML(game.language || "-")}</strong><span>Bahasa</span></div>
              </div>
            </div>

            <div class="note-box detail-note">
              Genre: ${escapeHTML((game.genres || []).join(", ") || "-")}<br>
              Platform: ${escapeHTML((game.platform || []).join(", ") || "-")}<br>
              Status: ${escapeHTML(game.status || "Updated")}
            </div>

            <div class="detail-downloads">
              ${renderDownloadButtons(game)}
            </div>
          </div>
        </section>

        <section class="detail-extra-grid">
          <div class="detail-block">
            <h2>Deskripsi Lengkap</h2>
            <p>${escapeHTML(game.description || "Belum ada deskripsi lengkap untuk game ini.")}</p>
          </div>

          <aside class="detail-side-block">
            <h2>Info Tambahan</h2>
            <ul class="detail-list">
              <li><b>Kategori:</b> ${escapeHTML(categoryLabel(game.category))}</li>
              <li><b>Genre:</b> ${escapeHTML((game.genres || []).join(", ") || "-")}</li>
              <li><b>Platform:</b> ${escapeHTML((game.platform || []).join(", ") || "-")}</li>
              <li><b>Bahasa:</b> ${escapeHTML(game.language || "-")}</li>
              <li><b>Status:</b> ${escapeHTML(game.status || "Updated")}</li>
              <li><b>Update:</b> ${escapeHTML(game.createdAt || "-")}</li>
            </ul>
          </aside>
        </section>

        <section class="related-panel">
          <h2>Game Terkait</h2>
          <p>Judul lain yang masih satu kategori atau punya genre yang mirip.</p>
          <div class="related-grid">
            ${related.length ? related.map(renderRelatedCard).join("") : '<div class="empty-state">Belum ada game terkait untuk ditampilkan.</div>'}
          </div>
        </section>
      `;
    }

    const APPS_SCRIPT_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AWDtjMVCqdm-kXhbZ2NlEllCYe7CnbriUv7NbxKBur1iMSfaMiF3tm2-A5jJf2RuXR734zwqG0w-scWiMkbyTZ-nT_VGpr_ft6dOgeVkdmRsUKdKP8FvDtLujTU4B29zCYL0qNtbdkogGbkZf22cyTv4AwkGu5eHJ0zoFioctKSx3YH4aTam4f1w-8CIMLSXiRf0yr3D71MaQcyaopQfGcezNiGKcFz1nR01ngxRk-mUXaMqAJ_pSoLuCtHvRUuPdAWNnHnqbXD-hWgg9CgKDUNKz3GNMHuN5A&lib=M51hLTJXPQ14ZsjBvmZx8t4ZA7c56I8fg&sheet=githubweb_game_update";

async function initDetail() {
  const app = document.getElementById("detailApp");
  const params = new URLSearchParams(window.location.search);
  const slug = params.get("slug") || "";

  if (!slug) {
    renderNotFound(app, slug);
    return;
  }

  try {
    const res = await fetch(APPS_SCRIPT_URL);
    if (!res.ok) throw new Error("Gagal memuat data katalog.");

    const data = await res.json();

    const games = Array.isArray(data)
      ? data
      : Array.isArray(data.rows)
        ? data.rows
        : [];

    const game = games.find((item) => String(item.slug || "") === slug);

    if (!game) {
      renderNotFound(app, slug);
      return;
    }

    renderDetail(app, game, games);
  } catch (err) {
    app.innerHTML = `<div class="not-found"><h1>Gagal memuat detail</h1><p class="muted">${escapeHTML(err.message)}</p></div>`;
  }
}

    document.addEventListener("DOMContentLoaded", () => {
      const nav = document.getElementById("mainNav");
      const toggle = document.getElementById("navToggle");

      if (nav && toggle) {
        const STORAGE_KEY = "kp-mobile-nav-collapsed";

        function isMobile() {
          return window.matchMedia("(max-width: 768px)").matches;
        }

        function setState(collapsed) {
          nav.classList.toggle("is-collapsed", collapsed);
          toggle.classList.toggle("is-active", !collapsed);
          toggle.setAttribute("aria-expanded", collapsed ? "false" : "true");
        }

        function loadState() {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved === null) return true;
          return saved === "1";
        }

        function applyResponsiveState() {
          if (isMobile()) {
            setState(loadState());
          } else {
            nav.classList.remove("is-collapsed");
            toggle.classList.remove("is-active");
            toggle.setAttribute("aria-expanded", "true");
          }
        }

        toggle.addEventListener("click", () => {
          const collapsed = !nav.classList.contains("is-collapsed");
          setState(collapsed);
          localStorage.setItem(STORAGE_KEY, collapsed ? "1" : "0");
        });

        window.addEventListener("resize", applyResponsiveState);
        applyResponsiveState();
      }

      initDetail();
    });
  </script>
</body>
